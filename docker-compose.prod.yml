version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
      POSTGRES_USER: ${POSTGRES_USER:-trading_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    volumes:
      - model_data:/app/data/trained_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python3 scripts/seed_if_empty.py && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-keep-alive 120"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.prod
    volumes:
      - model_data:/app/data/trained_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info --pool=solo

  celery-beat:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.prod
    volumes:
      - model_data:/app/data/trained_models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: celery -A workers.celery_app beat --loglevel=info

volumes:
  model_data:
  postgres_data:
  redis_data:
