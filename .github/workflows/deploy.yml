# .github/workflows/deploy.yml
# Auto-deploys to DigitalOcean Droplet on every push to main branch.
# Required GitHub Secrets:
#   DROPLET_IP        — your Droplet's public IP address
#   SSH_PRIVATE_KEY   — private SSH key for root access to Droplet
#   ENV_PROD_CONTENTS — full contents of your .env.prod file (base64 encoded)

name: Deploy AlgoTrade

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_IP }}
          username: root
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== AlgoTrade Deploy ==="
            cd /opt/algotrade

            # Pull latest code
            git pull origin main

            # Update .env.prod from GitHub secret
            echo "${{ secrets.ENV_PROD_CONTENTS }}" | base64 -d > .env.prod

            # Build and restart containers
            docker-compose -f docker-compose.prod.yml build --no-cache backend celery
            docker-compose -f docker-compose.prod.yml up -d

            # Wait for backend to be healthy
            echo "Waiting for backend..."
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8000/health; then
                echo "Backend healthy"
                break
              fi
              sleep 5
            done

            # Final health check
            curl -sf http://localhost:8000/health || {
              echo "Health check failed — rolling back"
              git stash
              docker-compose -f docker-compose.prod.yml up -d
              exit 1
            }

            echo "Deploy complete — $(date)"
